{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "music-assistant-alexa-skill.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "music-assistant-alexa-skill.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "music-assistant-alexa-skill.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "music-assistant-alexa-skill.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "music-assistant-alexa-skill.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "music-assistant-alexa-skill.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "music-assistant-alexa-skill.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port | int }}
              protocol: TCP
            {{- if and .Values.config.debugPort (ne .Values.config.debugPort "0") }}
            - name: debug
              containerPort: {{ .Values.config.debugPort | int }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "music-assistant-alexa-skill.configMapName" . }}
          env:
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-assistant-alexa-skill.secretName" . }}
                  key: APP_USERNAME
                  optional: true
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-assistant-alexa-skill.secretName" . }}
                  key: APP_PASSWORD
                  optional: true
          {{- $hasCredentials := or .Values.credentials.appUsername .Values.credentials.appPassword .Values.existingSecret }}
          {{- if $hasCredentials }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - >-
                  curl -sf -u "$APP_USERNAME:$APP_PASSWORD"
                  http://localhost:{{ .Values.config.port }}/status
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - >-
                  curl -sf -u "$APP_USERNAME:$APP_PASSWORD"
                  http://localhost:{{ .Values.config.port }}/status
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- else }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: ask-data
              mountPath: /root/.ask
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: ask-data
          persistentVolumeClaim:
            claimName: {{ include "music-assistant-alexa-skill.pvcName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
